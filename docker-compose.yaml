services:
  backend:
    image: arizona-make-backend
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4200 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    environment:
      PORT: ${PORT}
      DATASOURCE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      DATASOURCE_USERNAME: ${DB_USER}
      DATASOURCE_PASSWORD: ${DB_PASSWORD}
      RACE_CHANNEL_ID: ${RACE_CHANNEL_ID}
      RACE_VIP_CHANNEL_ID: ${RACE_VIP_CHANNEL_ID}
      CRYPTO_WALLET_ADDRESS: UQAVr7xPb8jb7mSXvdiqWeljqUx0_-9KZGMtfQZzde-HTias
      CRYPTO_WALLET_TON_URL: https://toncenter.com/api/v2/getTransactions?address=UQAVr7xPb8jb7mSXvdiqWeljqUx0_-9KZGMtfQZzde-HTias
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
  telegram-bot:
    image: arizona-make-telegram-bot
    build:
      context: ./telegram-bot
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: ${BACKEND_URL}
      TOKEN_TELEGRAM_BOT: ${TOKEN_TELEGRAM_BOT}
      DEVELOPER_ID: ${DEVELOPER_ID}
      ASSETS_CHANNEL_ID: ${ASSETS_CHANNEL_ID}
      RACE_CHANNEL_ID: ${RACE_CHANNEL_ID}
      RACE_VIP_CHANNEL_ID: ${RACE_VIP_CHANNEL_ID}
      CRYPTO_WALLET_ADDRESS: UQAVr7xPb8jb7mSXvdiqWeljqUx0_-9KZGMtfQZzde-HTias
      CRYPTO_WALLET_TON_URL: https://toncenter.com/api/v2/getTransactions?address=UQAVr7xPb8jb7mSXvdiqWeljqUx0_-9KZGMtfQZzde-HTias
  db:
    image: postgres:16.0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}", "-d", "${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data: